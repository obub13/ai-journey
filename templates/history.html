<!doctype html>
<html>
  <head>
    <title>Ticket History</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }

      header {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        padding: 16px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: #2563eb;
      }

      .logo span {
        color: #1e293b;
      }

      nav a {
        color: #64748b;
        text-decoration: none;
        font-size: 14px;
        margin-left: 24px;
      }

      nav a:hover {
        color: #2563eb;
      }
      h1 {
        color: #333;
      }
      .content {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
      }

      .ticket {
        background: white;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        margin-bottom: 16px;
      }

      .ticket-number {
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 8px;
      }

      .issue {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 10px;
        font-size: 15px;
      }

      .answer {
        color: #475569;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .timestamp {
        font-size: 11px;
        color: #cbd5e1;
        margin-top: 12px;
      }
      a {
        color: #2563eb;
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Triage<span>AI</span></div>
      <nav>
        <a href="/">Analyze</a>
        <a href="/history">Ticket History</a>
      </nav>
    </header>
    <br /><br />

    {% for ticket in tickets %}
    <div class="content">
      <div class="ticket">
        <div class="ticket-number">Ticket #{{ ticket.ticket_number }}</div>
        <div class="issue">{{ ticket.issue }}</div>
        <div class="answer">{{ ticket.final_answer | safe}}</div>
        <div class="timestamp">{{ ticket.timestamp }}</div>
      </div>
    </div>
    {% endfor %}
  </body>
</html>
