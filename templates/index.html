<!doctype html>
<html>
  <head>
    <title>Ticket Triage</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        background: #f5f5f5;
      }
      h1 {
        color: #333;
      }
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        resize: vertical;
      }
      button {
        margin-top: 10px;
        padding: 10px 24px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      .result {
        margin-top: 30px;
        background: white;
        padding: 20px;
        border-radius: 6px;
        border: 1px solid #ddd;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Support Ticket Analyzer</h1>
    <a href="/history">View ticket history →</a>
    <form action="/analyze" method="POST">
      <textarea
        name="ticket"
        rows="6"
        placeholder="Paste your ticket here..."
      ></textarea>
      <br />
      <button
        type="submit"
        onclick="
          setTimeout(() => {
            this.innerText = 'Analyzing...';
            this.disabled = true;
          }, 10)
        "
      >
        Analyze
      </button>
    </form>

    {% if result %}
    <div class="result">
      <h2>Analysis</h2>
      <p>{{ result }}</p>
    </div>
    {% endif %}
  </body>
</html>
